services:
  backend:
    build: ./backend
    container_name: fitmanager_backend
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_DATABASE: fitmanager
      DB_USERNAME: fitmanager
      DB_PASSWORD: secret

  frontend:
    build: ./frontend
    container_name: fitmanager_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8001/api
    depends_on:
      - backend

  mysql:
    image: mysql:8.4
    container_name: fitmanager_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: fitmanager
      MYSQL_USER: fitmanager
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5
    container_name: fitmanager_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: fitmanager
      PMA_PASSWORD: secret
    depends_on:
      - mysql

volumes:
  mysql_data:
