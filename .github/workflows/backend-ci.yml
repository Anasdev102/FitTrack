name: Backend CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_sqlite, sqlite3
          coverage: none

      - run: composer install --no-interaction --prefer-dist

      - run: cp .env.example .env

      - run: |
          touch database/database.sqlite
          sed -i "s/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/" .env
          sed -i "s|^DB_DATABASE=.*|DB_DATABASE=${{ github.workspace }}/backend/database/database.sqlite|" .env
          echo "CACHE_DRIVER=array" >> .env
          echo "SESSION_DRIVER=array" >> .env
          echo "QUEUE_CONNECTION=sync" >> .env

      - run: php artisan key:generate

      - run: php artisan migrate --force

      - name: Run basic Laravel checks
        run: |
          echo "Skipping php artisan test because this Laravel install does not provide the test command."
          php artisan route:list
          php artisan config:clear
